<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Legislative Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.95;
        }

        main {
            padding: 40px 30px;
        }

        .input-section {
            margin-bottom: 30px;
        }

        .input-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e5e7eb;
        }

        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 1em;
            color: #6b7280;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-btn:hover {
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        textarea {
            width: 100%;
            min-height: 250px;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.95em;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .file-upload-area {
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f9fafb;
        }

        .file-upload-area:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        .file-upload-area.dragover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }

        .file-upload-area input[type="file"] {
            display: none;
        }

        .file-upload-area p {
            color: #6b7280;
            margin-bottom: 10px;
        }

        .file-upload-area .upload-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        button.submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
            width: 100%;
        }

        button.submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button.submit-btn:active {
            transform: translateY(0);
        }

        button.submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #e5e7eb;
            border-top-color: #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .results-section {
            display: none;
            margin-top: 40px;
            padding-top: 40px;
            border-top: 2px solid #e5e7eb;
        }

        .results-section.active {
            display: block;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .results-header h2 {
            font-size: 1.8em;
            color: #1f2937;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .stat-card .label {
            color: #6b7280;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .stat-card .value {
            font-size: 1.8em;
            font-weight: bold;
            color: #1f2937;
        }

        .analysis-output {
            background: #f9fafb;
            padding: 20px;
            border-radius: 8px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.95em;
            color: #374151;
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid #dc2626;
        }

        .success-message {
            background: #dcfce7;
            color: #166534;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid #22c55e;
        }

        .file-name {
            color: #667eea;
            margin-top: 10px;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            main {
                padding: 20px;
            }

            .results-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚖️ AI Legislative Analyzer</h1>
            <p>Extract structured insights from legal and policy documents</p>
        </header>

        <main>
            <div class="input-section">
                <div class="input-tabs">
                    <button class="tab-btn active" onclick="switchTab('text')">📝 Paste Text</button>
                    <button class="tab-btn" onclick="switchTab('file')">📤 Upload File</button>
                </div>

                <!-- Text Input Tab -->
                <div id="text-tab" class="tab-content active">
                    <textarea id="text-input" placeholder="Paste your legal document, policy, or legislative text here..."></textarea>
                </div>

                <!-- File Upload Tab -->
                <div id="file-tab" class="tab-content">
                    <div class="file-upload-area" id="upload-area">
                        <div class="upload-icon">📄</div>
                        <p>Drag and drop your PDF or text file here</p>
                        <p style="font-size: 0.9em; color: #9ca3af;">or click to browse</p>
                        <input type="file" id="file-input" accept=".pdf,.txt,.doc,.docx" onchange="handleFileSelect()">
                        <div class="file-name" id="file-name"></div>
                    </div>
                </div>

                <button class="submit-btn" onclick="analyzeDocument()">🚀 Analyze Document</button>
            </div>

            <!-- Loading Indicator -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Analyzing your document... this may take a moment</p>
            </div>

            <!-- Results Section -->
            <div class="results-section" id="results">
                <div class="results-header">
                    <h2>Analysis Results</h2>
                    <button class="submit-btn" style="width: auto; margin: 0;" onclick="clearResults()">Clear</button>
                </div>

                <div class="stats" id="stats"></div>

                <div id="result-message"></div>

                <div class="analysis-output" id="output"></div>
            </div>
        </main>
    </div>

    <script>
        // Tab switching
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');
        }

        // File upload handling
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            fileInput.files = e.dataTransfer.files;
            handleFileSelect();
        });

        function handleFileSelect() {
            const file = fileInput.files[0];
            if (file) {
                document.getElementById('file-name').textContent = `Selected: ${file.name}`;
            }
        }

        // Main analysis function
        async function analyzeDocument() {
            const textInput = document.getElementById('text-input').value;
            const fileInput = document.getElementById('file-input');

            if (!textInput && !fileInput.files[0]) {
                alert('Please enter text or select a file to analyze.');
                return;
            }

            // Prepare form data
            const formData = new FormData();
            if (fileInput.files[0]) {
                formData.append('file', fileInput.files[0]);
            } else {
                formData.append('text', textInput);
            }

            // Show loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').classList.remove('active');

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok && data.status === 'success') {
                    displayResults(data);
                } else {
                    displayError(data.error || 'An error occurred during analysis.');
                }
            } catch (error) {
                displayError(`Network error: ${error.message}`);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // Display results
        function displayResults(data) {
            // Display stats
            const stats = data.chunk_stats;
            const statsHtml = `
                <div class="stat-card">
                    <div class="label">Chunks Processed</div>
                    <div class="value">${data.num_chunks}</div>
                </div>
                <div class="stat-card">
                    <div class="label">Original Tokens</div>
                    <div class="value">${stats.original_total_tokens}</div>
                </div>
                <div class="stat-card">
                    <div class="label">Compressed Tokens</div>
                    <div class="value">${stats.compressed_total_tokens}</div>
                </div>
                <div class="stat-card">
                    <div class="label">Compression Ratio</div>
                    <div class="value">${((1 - stats.compressed_total_tokens / stats.original_total_tokens) * 100).toFixed(1)}%</div>
                </div>
            `;
            document.getElementById('stats').innerHTML = statsHtml;

            // Display message
            const msgHtml = `<div class="success-message">✓ Analysis completed successfully</div>`;
            document.getElementById('result-message').innerHTML = msgHtml;

            // Display analysis output
            document.getElementById('output').textContent = data.summary;

            // Show results
            document.getElementById('results').classList.add('active');
        }

        // Display error
        function displayError(message) {
            const msgHtml = `<div class="error-message">✗ Error: ${message}</div>`;
            document.getElementById('result-message').innerHTML = msgHtml;
            document.getElementById('results').classList.add('active');
        }

        // Clear results
        function clearResults() {
            document.getElementById('text-input').value = '';
            document.getElementById('file-input').value = '';
            document.getElementById('file-name').textContent = '';
            document.getElementById('results').classList.remove('active');
            document.getElementById('stats').innerHTML = '';
            document.getElementById('result-message').innerHTML = '';
            document.getElementById('output').textContent = '';
        }
    </script>
</body>
</html>
